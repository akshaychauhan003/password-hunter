name: Build Android APK

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android/**'
      - '.github/workflows/android-apk-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradle
        run: chmod +x android/gradlew

      - name: Build APK with Gradle
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace

      - name: Verify APK was copied to public/downloads
        run: |
          if [ -f "public/downloads/password-hunter.apk" ]; then
            echo "✓ APK successfully copied to public/downloads/"
            ls -lh public/downloads/password-hunter.apk
          else
            echo "✗ APK copy failed"
            exit 1
          fi

      - name: Upload APK as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: password-hunter-apk
          path: public/downloads/password-hunter.apk
          retention-days: 90

      - name: Create Release (on main branch only)
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: public/downloads/password-hunter.apk
          tag_name: android-v1.0.0-${{ github.run_number }}
          body: |
            ## Android APK Release
            
            **Version:** 1.0.0
            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            
            ### Installation Instructions
            
            1. Download `password-hunter.apk` from the assets below
            2. On your Android device, enable "Install from unknown sources" in Settings
            3. Open the APK file and tap Install
            4. Grant requested permissions
            5. Launch the app!
            
            ### Features
            - Native Android client
            - Direct Spring Boot backend connection
            - Offline mode support
            - Educational cybersecurity simulator
            
            **Note:** This is an educational tool. Use responsibly.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Slack notification (success)
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✓ Android APK Build Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Android APK Build Successful* :white_check_mark:\n\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Build:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }

      - name: Slack notification (failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✗ Android APK Build Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Android APK Build Failed* :x:\n\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Build:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        continue-on-error: true
